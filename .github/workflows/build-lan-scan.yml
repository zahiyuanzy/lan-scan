name: Build LAN Scan EXE

on:
  push:
    paths:
      - "lan_scan.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build EXE
        run: |
          pyinstaller ^
            --onefile ^
            --clean ^
            --name lan_scan ^
            --add-data "lan_scan.py;." ^
            lan_scan.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan_scan_exe
          path: dist/lan_scan.exe
          retention-days: 30
